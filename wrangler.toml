name = "auror2-integracion-ia"
main = "index.ts"
compatibility_date = "2026-05-17"
compatibility_flags = ["nodejs_compat"]

# ── Cloudflare AI Binding ────────────────────────────────────────────────────
# This gives access to env.AI for Workers AI models (embeddings, vision, LLM)
[ai]
binding = "AI"

# ── Environment Variables (non-secret) ───────────────────────────────────────
[vars]
ENVIRONMENT = "production"
MAX_DOCUMENTS_SEMANTIC = "3"
MAX_RESULTS_SOCIAL = "20"
DEFAULT_SEARCH_PLATFORMS = "linkedin,twitter,github"
MAX_UPLOAD_MB = "20"

# ── Secrets (set via: wrangler secret put <NAME>) ────────────────────────────
# API_KEY            — Bearer token for authenticating requests
# ALLOWED_ORIGINS    — Comma-separated allowed CORS origins (e.g. "https://auror.app,https://dev.auror.app")
# SERPER_API_KEY     — Serper.dev API key (main search API)
# CRAWLBASE_TOKEN    — Crawlbase regular token (static pages)
# CRAWLBASE_JS_TOKEN — Crawlbase JS token (JS-rendered pages: LinkedIn, Twitter, etc.)
# APYHUB_TOKEN       — Apyhub Sharp API token (scraping)
# SCRAPINGBEE_API_KEY — ScrapingBee API key (scraping)
#
# NEVER hardcode secrets here. Use Cloudflare Dashboard or wrangler secret.

# ── Dev overrides ────────────────────────────────────────────────────────────
[env.dev]
name = "auror2-integracion-ia-dev"
[env.dev.vars]
ENVIRONMENT = "development"
